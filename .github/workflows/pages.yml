name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # CI 里若 NODE_ENV=production，npm 会跳过 devDependencies，
      # 导致 tailwind / postcss / typescript 等缺失，出现大面积 Module not found。
      - name: Install
        env:
          NODE_ENV: development
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Check next.config (static export)
        run: |
          test -f next.config.ts || (echo "missing next.config.ts" && exit 1)
          grep -qE 'output:[[:space:]]*"export"' next.config.ts || (
            echo "::error::next.config.ts 里必须有 output: \"export\"，否则不会生成 out/ 目录。请用本仓库里的 next.config.ts 覆盖后重跑。"
            exit 1
          )

      - name: Build (static export)
        env:
          GITHUB_PAGES: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production
        run: npm run build

      - name: Verify export output
        run: |
          test -d out || (echo "::error::没有生成 out/。请确认 next.config.ts 含 output: \"export\" 且构建无报错。" && exit 1)
          test -f out/index.html || (echo "::error::out/index.html 不存在" && exit 1)
          ls -la out | head -n 30

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

